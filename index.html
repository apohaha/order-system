<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>入單系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f2f2f7;
  --surface: #ffffff;
  --surface2: #f2f2f7;
  --grouped: #ffffff;
  --border: #e5e5ea;
  --border2: #c7c7cc;
  --text: #000000;
  --text2: #3c3c43;
  --text3: #8e8e93;
  --accent: #007aff;
  --accent-bg: #e8f2ff;
  --green: #34c759;
  --green-dark: #248a3d;
  --red: #ff3b30;
  --red-bg: #fff2f1;
  --yellow: #ff9500;
  --radius: 12px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, 'SF Pro Text', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
}

/* ── App shell ── */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.screen { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(80px + var(--safe-bottom)); }
.screen.active { display: block; }

/* ── Nav bar (top) ── */
.nav-bar {
  background: rgba(242,242,247,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border2);
  padding: 12px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  min-height: 52px;
}
.nav-title { font-size: 17px; font-weight: 600; }
.nav-sub { font-size: 13px; color: var(--text3); }
.nav-action { font-size: 16px; color: var(--accent); font-weight: 500; background: none; border: none; cursor: pointer; padding: 4px 0; font-family: inherit; }

/* ── Tab bar (bottom) ── */
.tab-bar {
  display: flex;
  background: rgba(242,242,247,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--border2);
  position: fixed; bottom: 0; left: 0; right: 0;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 4px; cursor: pointer; border: none; background: none;
  color: var(--text3); font-size: 10px; font-family: inherit; gap: 3px;
  transition: color 0.15s;
}
.tab-item.active { color: var(--accent); }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 10px; font-weight: 500; }

/* ── Sections ── */
.section { padding: 20px 16px 10px; }
.section-title {
  font-size: 13px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.04em;
  margin-bottom: 8px; padding-left: 4px;
}

/* ── iOS-style grouped list ── */
.group {
  background: var(--grouped);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.08);
  overflow: visible;
}
.group > *:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.group > *:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
.group > *:only-child  { border-radius: var(--radius); }
.group-row {
  display: flex; align-items: center;
  padding: 13px 16px;
  border-bottom: 0.5px solid var(--border);
  gap: 10px; min-height: 48px;
  position: relative;
}
.group-row:last-child { border-bottom: none; }
.group-row label { font-size: 15px; color: var(--text2); flex-shrink: 0; width: 72px; }
.group-row input, .group-row select {
  flex: 1; border: none; outline: none; font-size: 15px;
  font-family: inherit; color: var(--text); background: transparent;
  text-align: left; padding: 0; min-width: 0;
}
.group-row select { cursor: pointer; }
.group-row input::placeholder { color: var(--text3); }
.group-row .row-right { margin-left: auto; color: var(--text3); font-size: 15px; }

/* ── Autocomplete ── */
.ac-wrap { position: relative; flex: 1; min-width: 0; }
.ac-list {
  position: absolute; top: calc(100% + 8px); left: -16px; right: -16px;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(0,0,0,0.15); z-index: 200;
  max-height: 240px; overflow-y: auto;
  border: 0.5px solid var(--border);
}
.ac-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 16px; font-size: 15px; cursor: pointer;
  border-bottom: 0.5px solid var(--border);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active, .ac-item.ac-sel { background: var(--accent-bg); }
.ac-item .ac-id { font-size: 13px; color: var(--text3); font-family: monospace; }
.ac-item mark { background: #ffec3d55; border-radius: 2px; }

/* ── Product rows ── */
.prod-rows { display: flex; flex-direction: column; }
.prod-row {
  border-bottom: 0.5px solid var(--border);
  padding: 0;
}
.prod-row:last-child { border-bottom: none; }
.prod-row-top {
  display: grid;
  grid-template-columns: 1fr auto 36px;
  gap: 0;
  align-items: stretch;
  min-height: 48px;
}
.prod-row-top .pr-cat {
  border-right: 0.5px solid var(--border);
  padding: 0 10px;
  font-size: 14px; color: var(--text); background: transparent;
  border-top: none; border-left: none; border-bottom: none;
  outline: none; font-family: inherit; cursor: pointer;
  min-width: 90px; max-width: 110px;
}
.prod-row-top .pr-prod-wrap {
  flex: 1; display: flex; flex-direction: column; position: relative;
  border-right: 0.5px solid var(--border); padding: 0;
}
.prod-row-top .pr-prod-input {
  border: none; outline: none; font-size: 15px;
  font-family: inherit; color: var(--text); background: transparent;
  padding: 0 10px; height: 48px; width: 100%;
}
.prod-row-top .pr-prod-input::placeholder { color: var(--text3); }
.prod-row-top .pr-qty {
  border: none; outline: none; font-size: 15px;
  font-family: inherit; color: var(--text); background: transparent;
  padding: 0 8px; width: 52px; text-align: center;
}
.prod-row-top .pr-del {
  width: 36px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer;
  color: var(--text3); font-size: 20px; line-height: 1;
}
.prod-row-top .pr-del:active { color: var(--red); }
.prod-row-note {
  border-top: 0.5px solid var(--border);
  display: none;
}
.prod-row-note input {
  width: 100%; border: none; outline: none; font-size: 14px;
  font-family: inherit; color: var(--text2); background: transparent;
  padding: 10px 16px;
}
.prod-row-note input::placeholder { color: var(--text3); }
.prod-row-note.visible { display: block; }

/* dropdown suggestion */
.prod-dropdown {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  z-index: 150; max-height: 200px; overflow-y: auto;
  border: 0.5px solid var(--border); border-top: none;
}
.prod-dd-item {
  padding: 11px 14px; font-size: 14px; cursor: pointer;
  border-bottom: 0.5px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.prod-dd-item:last-child { border-bottom: none; }
.prod-dd-item:active, .prod-dd-item.pd-sel { background: var(--accent-bg); }
.prod-dd-item .pd-price { font-size: 13px; color: var(--text3); }
.prod-dd-item mark { background: #ffec3d55; border-radius: 2px; }

/* add row button */
.add-row-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 13px 16px; font-size: 15px; color: var(--accent);
  background: none; border: none; cursor: pointer; font-family: inherit; width: 100%;
}
.add-row-btn:active { opacity: 0.6; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 20px; border-radius: var(--radius); font-size: 16px; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit; transition: opacity 0.15s; width: 100%;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-outline {
  background: var(--grouped); color: var(--accent);
  border: 0.5px solid var(--border2); font-weight: 500;
}
.btn-danger-text { background: none; border: none; color: var(--red); font-size: 16px; font-family: inherit; cursor: pointer; font-weight: 500; padding: 8px 0; }
.btn-sm { padding: 10px 16px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); width: auto; }

/* ── Stats ── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-box { background: var(--grouped); border-radius: var(--radius); padding: 14px 16px; }
.stat-box .st-label { font-size: 12px; color: var(--text3); margin-bottom: 2px; }
.stat-box .st-val { font-size: 24px; font-weight: 600; }

/* ── Table (orders list) ── */
.order-card {
  background: var(--grouped); border-radius: var(--radius);
  margin-bottom: 10px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}
.order-card-head {
  padding: 12px 16px; border-bottom: 0.5px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.order-card-head .oc-name { font-weight: 600; font-size: 15px; }
.order-card-head .oc-time { font-size: 12px; color: var(--text3); }
.order-card-items { padding: 0; }
.oc-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; border-bottom: 0.5px solid var(--border); font-size: 14px;
}
.oc-item:last-child { border-bottom: none; }
.oc-item .oci-name { color: var(--text); }
.oc-item .oci-qty { font-weight: 600; color: var(--accent); }
.oc-item .oci-note { font-size: 12px; color: var(--text3); }

/* ── Summary table ── */
.sum-table { background: var(--grouped); border-radius: var(--radius); overflow: hidden; }
.sum-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 16px; border-bottom: 0.5px solid var(--border); font-size: 15px;
}
.sum-row:last-child { border-bottom: none; }
.sum-row.sum-total { font-weight: 600; }
.sum-row .sr-qty { font-weight: 600; color: var(--accent); }

/* ── Manage list ── */
.manage-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 0.5px solid var(--border); font-size: 15px;
}
.manage-item:last-child { border-bottom: none; }
.manage-item .mi-del { color: var(--red); background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 0 0 12px; line-height: 1; }

/* ── Merge source ── */
.merge-src {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 16px; border-bottom: 0.5px solid var(--border); font-size: 15px;
}
.merge-src:last-child { border-bottom: none; }
.merge-src .ms-label { font-weight: 500; }
.merge-src .ms-count { font-size: 13px; color: var(--text3); }
.merge-src .ms-del { color: var(--red); background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 0 0 12px; }

/* ── Notice ── */
.notice {
  background: var(--accent-bg); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 14px; color: #1450a3;
  margin-bottom: 14px; line-height: 1.5;
}

/* ── Toast ── */
#toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%) scale(0.9);
  background: rgba(0,0,0,0.78); color: #fff;
  padding: 10px 20px; border-radius: 20px; font-size: 14px;
  opacity: 0; transition: all 0.22s; pointer-events: none; z-index: 9999;
  white-space: nowrap; font-weight: 500;
}
#toast.show { opacity: 1; transform: translateX(-50%) scale(1); }

/* ── Empty ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── Badge ── */
.badge { display: inline-block; background: var(--accent-bg); color: var(--accent); border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 600; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  background: var(--surface); border-radius: 20px 20px 0 0; width: 100%;
  max-width: 480px; padding: 20px 16px calc(20px + var(--safe-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { font-size: 13px; color: var(--text3); margin-bottom: 4px; display: block; }
.modal-field input { width: 100%; border: none; border-bottom: 1px solid var(--border2); padding: 10px 0; font-size: 16px; font-family: inherit; outline: none; background: transparent; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-actions .btn { flex: 1; }

/* ── Order inner tabs ── */
.otab {
  flex: 1; padding: 10px 0; font-size: 14px; font-weight: 500;
  border: none; background: none; cursor: pointer; font-family: inherit;
  color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -0.5px;
  transition: color 0.15s;
}
.otab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Stats cat block ── */
.cat-block { margin-bottom: 16px; }
.cat-block-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--grouped); border-radius: var(--radius) var(--radius) 0 0;
  border-bottom: 0.5px solid var(--border); cursor: pointer;
}
.cat-block-head .cb-name { font-weight: 600; font-size: 15px; }
.cat-block-head .cb-meta { font-size: 13px; color: var(--text3); display:flex; gap:12px; align-items:center; }
.cat-block-head .cb-chevron { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
.cat-block-head.open .cb-chevron { transform: rotate(180deg); }
.cat-block-body { background: var(--grouped); border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.cat-prod-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 15px;
}
.cat-prod-row:last-child { border-bottom: none; }
.cat-prod-row .cpr-name { color: var(--text); }
.cat-prod-row .cpr-right { display: flex; gap: 14px; align-items: center; }
.cat-prod-row .cpr-qty { font-weight: 600; color: var(--accent); font-size: 15px; }
.cat-prod-row .cpr-amt { font-size: 13px; color: var(--green-dark); font-weight: 500; }

textarea {
  width: 100%; border: none; outline: none; font-size: 15px;
  font-family: inherit; color: var(--text); background: transparent;
  resize: none; padding: 0;
}
textarea::placeholder { color: var(--text3); }

.required { color: var(--red); }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div class="app">

  <!-- ══════════════════════════════════════════
       SCREEN 1: 新增訂單
  ══════════════════════════════════════════ -->
  <div id="screen-enter" class="screen active">
    <div class="nav-bar">
      <div>
        <div class="nav-title">新增訂單</div>
        <div class="nav-sub" id="enter-badge"></div>
      </div>
      <button class="nav-action" onclick="resetForm()">清除</button>
    </div>

    <!-- 場次選擇 -->
    <div id="session-bar" style="background:var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
        <span style="font-size:12px;color:rgba(255,255,255,0.8);flex-shrink:0">目前場次</span>
        <span id="session-name" style="font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          未選擇場次
        </span>
      </div>
      <button onclick="openSessionPicker()" style="background:rgba(255,255,255,0.2);border:none;border-radius:6px;padding:5px 10px;font-size:12px;color:#fff;font-weight:600;font-family:inherit;cursor:pointer;flex-shrink:0">切換</button>
    </div>

    <div class="section">
      <!-- Customer -->
      <div class="section-title">客戶</div>
      <div class="group">
        <div class="group-row">
          <label>名稱</label>
          <div class="ac-wrap">
            <input type="text" id="f-customer" placeholder="輸入名稱或編號…" autocomplete="off"
              oninput="onCustInput()" onkeydown="onCustKey(event)" />
            <div class="ac-list" id="cust-ac" style="display:none"></div>
          </div>
          <input type="hidden" id="f-customer-id" />
        </div>
        <div class="group-row">
          <label>備註</label>
          <input type="text" id="f-note" placeholder="整筆訂單備註（選填）" />
        </div>
      </div>

      <!-- Products -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-left:4px">
        <div class="section-title" style="margin-bottom:0">商品項目</div>
        <div style="font-size:13px;color:var(--text3)" id="row-count-hint">最多 10 項</div>
      </div>

      <div class="group">
        <!-- header hint -->
        <div style="display:grid;grid-template-columns:90px 1fr 52px 36px;padding:6px 10px 6px 0;border-bottom:0.5px solid var(--border)">
          <div style="font-size:11px;color:var(--text3);text-align:center;font-weight:600">類別</div>
          <div style="font-size:11px;color:var(--text3);padding-left:10px;font-weight:600">商品</div>
          <div style="font-size:11px;color:var(--text3);text-align:center;font-weight:600">數量</div>
          <div></div>
        </div>
        <div class="prod-rows" id="prod-rows"></div>
        <button class="add-row-btn" id="add-row-btn" onclick="addRow()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
          新增一項商品
        </button>
      </div>

      <button class="btn btn-primary" style="margin-top:4px" onclick="submitOrder()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>
        新增訂單
      </button>
    </div>

    <!-- Recent -->
    <div class="section" id="recent-section" style="display:none">
      <div class="section-title">最近新增</div>
      <div id="recent-list"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCREEN 2: 我的訂單
  ══════════════════════════════════════════ -->
  <div id="screen-orders" class="screen">
    <div class="nav-bar">
      <div class="nav-title">我的訂單</div>
    </div>
    <div class="section">
      <div class="stats-row" id="my-stats"></div>
      <div id="my-orders-list"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCREEN 3: 匯出
  ══════════════════════════════════════════ -->
  <div id="screen-merge" class="screen">
    <div class="nav-bar">
      <div class="nav-title">匯出</div>
    </div>

    <!-- tab: stats -->
    <div id="mpanel-stats" style="display:block">
      <div class="section">
        <div class="stats-row" id="stat-summary-boxes"></div>
      </div>
    </div>

    <div class="section" style="padding-top:0">
      <!-- Preview summary -->
      <div id="merge-preview-wrap">
        <div class="section-title">彙總預覽</div>
        <div class="sum-table" id="merge-sum-table"></div>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-green" onclick="exportExcel()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          匯出 Excel（明細＋彙總）
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       SCREEN 4: 資料管理
  ══════════════════════════════════════════ -->
  <div id="screen-manage" class="screen">
    <div class="nav-bar">
      <div class="nav-title">資料管理</div>
    </div>
    <div class="section">

<script>
// ════════════════════════════ STATE ════════════════════════════
let S = { customers:[], products:[], myOrders:[], mergeSources:[], sessions:[], currentSession:'' };
(()=>{ try{ const s=localStorage.getItem('oss_v4'); if(s) Object.assign(S,JSON.parse(s)); }catch(e){} })();
['customers','products','myOrders','mergeSources'].forEach(k=>{ if(!Array.isArray(S[k])) S[k]=[]; });

function save(){ try{ localStorage.setItem('oss_v4',JSON.stringify(S)); }catch(e){} }

// ════════════════════════════ TOAST ════════════════════════════
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// ════════════════════════════ NAV ════════════════════════════
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='orders'){ renderMyOrders(); }
  if(name==='merge'){ renderMerge(); }
  if(name==='manage'){ renderCustList(); renderProdList(); }
  if(name==='enter'){ rebuildAllCatSelects(); updateBadge(); }
}

// ════════════════════════════ MODAL ════════════════════════════
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function openAddCustomer(){ document.getElementById('mc-id').value=''; document.getElementById('mc-name').value=''; openModal('modal-add-customer'); setTimeout(()=>document.getElementById('mc-id').focus(),300); }
function openAddProduct(){
  document.getElementById('mp-cat').value='';
  document.getElementById('mp-price').value='';
  // populate datalist with existing categories
  const cats = [...new Set(S.products.map(p=>p.cat).filter(Boolean))];
  document.getElementById('mp-cat-list').innerHTML = cats.map(c=>`<option value="${c}">`).join('');
  // build initial 10 name rows
  const list = document.getElementById('mp-names-list');
  list.innerHTML = '';
  for(let i=0;i<10;i++) list.appendChild(makeProdNameRow(i+1));
  openModal('modal-add-product');
  setTimeout(()=>document.getElementById('mp-cat').focus(),300);
}

function makeProdNameRow(n){
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:6px';
  div.innerHTML = `<span style="font-size:13px;color:var(--text3);width:20px;text-align:right;flex-shrink:0">${n}</span>
    <input type="text" placeholder="商品名稱"
      style="flex:1;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:15px;font-family:inherit;outline:none;background:var(--surface)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();const inputs=document.querySelectorAll('#mp-names-list input');const idx=[...inputs].indexOf(this);if(inputs[idx+1])inputs[idx+1].focus();}" />`;
  return div;
}

function addMoreProdRows(){
  const list = document.getElementById('mp-names-list');
  const cur = list.children.length;
  for(let i=0;i<5;i++) list.appendChild(makeProdNameRow(cur+i+1));
  // focus first new row
  const inputs = list.querySelectorAll('input');
  if(inputs[cur]) inputs[cur].focus();
}

function addProductsBulk(){
  const cat   = document.getElementById('mp-cat').value.trim();
  const price = document.getElementById('mp-price').value.trim();
  if(!cat){ toast('請填入類別'); document.getElementById('mp-cat').focus(); return; }
  const names = [...document.querySelectorAll('#mp-names-list input')]
    .map(el=>el.value.trim()).filter(Boolean);
  if(!names.length){ toast('請至少填入一個商品名稱'); return; }
  let added=0, skipped=0;
  names.forEach(name=>{
    if(S.products.some(p=>p.name===name&&p.cat===cat)){ skipped++; return; }
    S.products.push({cat, name, price: price||''}); added++;
  });
  save(); closeModal('modal-add-product'); renderProdList(); rebuildAllCatSelects();
  toast(`✓ 新增 ${added} 項${skipped?`（${skipped} 項已存在略過）`:''}`);
}

// ════════════════════════════ AUTOCOMPLETE (customer) ════════════════════════════
let acIdx=-1;
function onCustInput(){
  const v=document.getElementById('f-customer').value.trim();
  document.getElementById('f-customer-id').value=''; acIdx=-1;
  if(!v){ closeAC(); return; }
  const q=v.toLowerCase();
  const hits=S.customers.filter(c=>c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){ closeAC(); return; }
  const el=document.getElementById('cust-ac');
  el.innerHTML=hits.map((c,i)=>`<div class="ac-item" onclick="selCust('${esc(c.id)}','${esc(c.name)}')">
    <span>${hilight(c.name,q)}</span><span class="ac-id">${hilight(c.id,q)}</span>
  </div>`).join('');
  el.style.display='block';
}
function onCustKey(e){
  const el=document.getElementById('cust-ac');
  const items=[...el.querySelectorAll('.ac-item')];
  if(e.key==='ArrowDown'){ acIdx=Math.min(acIdx+1,items.length-1); hlAC(items,acIdx); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ acIdx=Math.max(acIdx-1,0); hlAC(items,acIdx); e.preventDefault(); }
  else if(e.key==='Enter'&&acIdx>=0&&items[acIdx]){ items[acIdx].click(); e.preventDefault(); }
  else if(e.key==='Escape') closeAC();
}
function hlAC(items,i){ items.forEach((el,j)=>el.classList.toggle('ac-sel',j===i)); }
function selCust(id,name){
  document.getElementById('f-customer').value=name;
  document.getElementById('f-customer-id').value=id;
  closeAC();
}
function closeAC(){ document.getElementById('cust-ac').style.display='none'; acIdx=-1; }
document.addEventListener('click',e=>{ if(!e.target.closest('.ac-wrap')) closeAC(); });

function hilight(str,q){
  return str.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function esc(s){ return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ════════════════════════════ CATEGORIES ════════════════════════════
function getCategories(){
  const cats=new Set(S.products.map(p=>p.cat||'無類別').filter(Boolean));
  return [...cats].sort();
}
function getProductsByCat(cat){
  return S.products.filter(p=>(p.cat||'無類別')===cat);
}

// ════════════════════════════ PRODUCT ROWS ════════════════════════════
let rowSeq=0;
const MAX_ROWS=10;
let lastCat=''; // remembered category

function addRow(){
  const container=document.getElementById('prod-rows');
  if(container.children.length>=MAX_ROWS){ toast('最多 10 項商品'); return; }
  rowSeq++;
  const id='r'+rowSeq;
  const cats=getCategories();
  const catOptions=cats.length
    ? cats.map(c=>`<option value="${esc(c)}" ${c===lastCat?'selected':''}>${c}</option>`).join('')
    : '<option value="">（無類別）</option>';

  const div=document.createElement('div');
  div.className='prod-row'; div.id=id;
  div.innerHTML=`
    <div class="prod-row-top">
      <select class="pr-cat" onchange="onCatChange('${id}',this)">${catOptions}<option value="__all__" ${!cats.length?'selected':''}>全部</option></select>
      <div class="pr-prod-wrap">
        <input class="pr-prod-input" type="text" placeholder="搜尋或輸入商品…"
          oninput="onProdInput('${id}',this)" onkeydown="onProdKey(event,'${id}')"
          onfocus="onProdFocus('${id}',this)" autocomplete="off" />
        <div class="prod-dropdown" id="${id}-dd" style="display:none"></div>
      </div>
      <input class="pr-qty" type="number" value="1" min="1" inputmode="numeric" />
      <button class="pr-del" onclick="removeRow('${id}')">×</button>
    </div>
    <div class="prod-row-note" id="${id}-note">
      <input type="text" placeholder="單項備註（點擊新增）" />
    </div>`;
  container.appendChild(div);

  // Show note field on tap of product input (UX)
  div.querySelector('.pr-prod-input').addEventListener('focus', ()=>{
    div.querySelector('.prod-row-note').classList.add('visible');
  });

  updateRowControls();
  buildDropdown(id);
}

function removeRow(id){
  const el=document.getElementById(id);
  if(el){ el.remove(); updateRowControls(); }
}

function updateRowControls(){
  const cnt=document.getElementById('prod-rows').children.length;
  document.getElementById('add-row-btn').style.display=cnt>=MAX_ROWS?'none':'flex';
  document.getElementById('row-count-hint').textContent=cnt>=MAX_ROWS?'已達上限（10項）':`最多 10 項`;
}

function onCatChange(id,sel){
  lastCat=sel.value==='__all__'?'':sel.value;
  // propagate to all other rows
  document.querySelectorAll('.prod-row').forEach(row=>{
    if(row.id===id) return;
    const s=row.querySelector('.pr-cat');
    if(s && sel.value!=='__all__'){
      s.value=sel.value; // set if option exists
    }
  });
  buildDropdown(id);
  const inp=document.querySelector('#'+id+' .pr-prod-input');
  if(inp){ inp.value=''; inp.focus(); }
}

function buildDropdown(id,query=''){
  const row=document.getElementById(id); if(!row) return;
  const catSel=row.querySelector('.pr-cat');
  const cat=catSel?catSel.value:'';
  let prods=cat&&cat!=='__all__' ? getProductsByCat(cat) : S.products;
  if(query) prods=prods.filter(p=>p.name.toLowerCase().includes(query.toLowerCase()));
  const dd=document.getElementById(id+'-dd'); if(!dd) return;
  if(!prods.length){ dd.style.display='none'; return; }
  dd.innerHTML=prods.slice(0,12).map((p,i)=>`<div class="prod-dd-item" data-i="${i}"
    onclick="selectProduct('${id}','${esc(p.name)}')" >
    <span>${query?hilight(p.name,query):p.name}</span>
    <span class="pd-price">${p.price?'$'+p.price:''}</span>
  </div>`).join('');
  dd.style.display='block';
}

let ddIdx={};
function onProdFocus(id){ buildDropdown(id,''); ddIdx[id]=-1; }
function onProdInput(id,inp){
  buildDropdown(id,inp.value.trim()); ddIdx[id]=-1;
}
function onProdKey(e,id){
  const dd=document.getElementById(id+'-dd');
  const items=[...dd.querySelectorAll('.prod-dd-item')];
  if(e.key==='ArrowDown'){ ddIdx[id]=Math.min((ddIdx[id]||0)+1,items.length-1); hlDD(items,ddIdx[id]); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ ddIdx[id]=Math.max((ddIdx[id]||0)-1,0); hlDD(items,ddIdx[id]); e.preventDefault(); }
  else if(e.key==='Enter'){
    if(ddIdx[id]>=0&&items[ddIdx[id]]){ items[ddIdx[id]].click(); e.preventDefault(); }
  }
  else if(e.key==='Escape'){ dd.style.display='none'; }
}
function hlDD(items,i){ items.forEach((el,j)=>el.classList.toggle('pd-sel',j===i)); }

function selectProduct(id,name){
  const inp=document.querySelector('#'+id+' .pr-prod-input');
  if(inp){ inp.value=name; inp.blur(); }
  const dd=document.getElementById(id+'-dd');
  if(dd) dd.style.display='none';
  // focus qty
  const qty=document.querySelector('#'+id+' .pr-qty');
  if(qty){ qty.focus(); qty.select(); }
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.pr-prod-wrap')) {
    document.querySelectorAll('.prod-dropdown').forEach(dd=>dd.style.display='none');
  }
});

function rebuildAllCatSelects(){
  const cats=getCategories();
  document.querySelectorAll('.prod-row').forEach(row=>{
    const sel=row.querySelector('.pr-cat');
    if(!sel) return;
    const cur=sel.value;
    sel.innerHTML=cats.map(c=>`<option value="${esc(c)}" ${c===cur?'selected':''}>${c}</option>`).join('')+
      `<option value="__all__" ${(!cats.length||cur==='__all__')?'selected':''}>全部</option>`;
  });
}

function submitOrder(){
  const customer=document.getElementById('f-customer').value.trim();
  const customerId=document.getElementById('f-customer-id').value.trim();
  const note=document.getElementById('f-note').value.trim();

  if(!customer){ toast('請填入客戶名稱'); document.getElementById('f-customer').focus(); return; }

  // 場次必填
  if(!S.currentSession || !getCurrentSessionName()){
    showConfirm('尚未選擇場次，請先選擇場次再入單！', ()=>{ openSessionPicker(); });
    return;
  }

  // Block if customer not in list
  if(!S.customers.some(c=>c.name===customer||c.id===customer)){
    alertGoManage(`找不到客戶「${customer}」`); return;
  }

  const rows=document.querySelectorAll('.prod-row');
  if(!rows.length){ toast('請至少新增一項商品'); return; }

  const items=[]; let err=false;
  rows.forEach((row,i)=>{
    if(err) return;
    const name=(row.querySelector('.pr-prod-input').value||'').trim();
    const qty=parseInt(row.querySelector('.pr-qty').value)||0;
    const rowNote=(row.querySelector('.prod-row-note input')||{value:''}).value.trim();
    const cat=row.querySelector('.pr-cat').value;
    if(!name){ toast(`第 ${i+1} 項請填商品名稱`); err=true; return; }
    if(qty<1){ toast(`第 ${i+1} 項數量需 ≥ 1`); err=true; return; }
    // Block if product not in list
    if(!S.products.some(p=>p.name===name)){
      alertGoManage(`找不到商品「${name}」`); err=true; return;
    }
    const prod = S.products.find(p=>p.name===name && (p.cat||'')===(cat==='__all__'?p.cat:cat))
               || S.products.find(p=>p.name===name);
    items.push({product:name, qty, price:prod?prod.price:'', note:rowNote, cat:prod?prod.cat:cat!=='__all__'?cat:''});
  });
  if(err) return;

  const time=new Date().toLocaleString('zh-TW',{hour12:false});
  const custObj=S.customers.find(c=>c.name===customer||c.id===customer);
  const finalId=custObj?custObj.id:customerId;
  items.forEach(item=>{
    const orderId = `${Date.now()}-${Math.random().toString(36).substr(2,6)}`;
    S.myOrders.push({customer:custObj?custObj.name:customer, customerId:finalId, product:item.product,qty:item.qty,price:item.price,cat:item.cat,note:item.note,orderNote:note,time,session:getCurrentSessionName(),orderId});
  });
  save(); updateBadge(); renderRecent(); resetForm();
  toast(`✓ ${custObj?custObj.name:customer} — 已新增 ${items.length} 項`);
}

function resetForm(){
  document.getElementById('f-customer').value='';
  document.getElementById('f-customer-id').value='';
  document.getElementById('f-note').value='';
  document.getElementById('prod-rows').innerHTML='';
  rowSeq=0; updateRowControls(); addRow();

}

// ── 統一客戶標籤：編號 + 名稱同時顯示 ──
function custLabel(name, id){
  if(!id) return `<span class="oc-name">${name}</span>`;
  return `<span style="font-size:12px;color:var(--text3);font-family:monospace;margin-right:6px">${id}</span><span class="oc-name">${name}</span>`;
}

let _recentIdxMap = {};

function renderRecent(){
  const sec=document.getElementById('recent-section');
  const list=document.getElementById('recent-list');
  if(!S.myOrders.length){ sec.style.display='none'; return; }
  sec.style.display='block';

  // build groups from reversed order, keeping original indices
  const groups={};
  _recentIdxMap={};
  let mapSeq=0;
  S.myOrders.map((o,i)=>({...o,_i:i})).reverse().forEach(o=>{
    const key=o.customer+'|'+o.time;
    if(!groups[key]) groups[key]={customer:o.customer,customerId:o.customerId||'',items:[]};
    if(groups[key].items.length<10) groups[key].items.push(o);
  });

  list.innerHTML=Object.values(groups).slice(0,5).map(g=>`
    <div class="order-card">
      <div class="order-card-head" style="justify-content:space-between">
        <div>${custLabel(g.customer,g.customerId)}</div>
      </div>
      <div class="order-card-items">${g.items.map(o=>{
        const mIdx = mapSeq++;
        _recentIdxMap[mIdx] = o._i;
        return `<div class="oc-item">
          <span class="oci-name">${o.product}</span>
          <span class="oci-qty" style="margin-right:8px">×${o.qty}</span>
          <button onclick="deleteRecentItem(${mIdx})"
            style="background:none;border:none;color:var(--red);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0;padding:0">刪除</button>
        </div>`;
      }).join('')}
      </div>
    </div>`).join('');
}

function deleteRecentItem(mIdx){
  const orderIdx = _recentIdxMap[mIdx];
  if(orderIdx===undefined){ toast('找不到該筆'); return; }
  showConfirm('確定刪除這筆訂單？', ()=>{
    S.myOrders.splice(orderIdx, 1);
    save(); updateBadge(); renderRecent();
    toast('已刪除');
  });
}

function renderMyOrders(){
  const orders = S.myOrders;
  const statsEl = document.getElementById('my-stats');
  const totalQty = orders.reduce((a,o)=>a+(o.qty||0),0);
  statsEl.innerHTML=`
    <div class="stat-box"><div class="st-label">總筆數</div><div class="st-val">${orders.length}</div></div>
    <div class="stat-box"><div class="st-label">總數量</div><div class="st-val">${totalQty}</div></div>`;

  if(!orders.length){
    document.getElementById('my-orders-list').innerHTML='<div class="empty-state"><div class="es-icon">📋</div><p>尚無訂單</p></div>';
    return;
  }

  // Group ALL orders by customer name
  const byCustomer = {};
  orders.forEach((o,i)=>{
    const key = o.customer;
    if(!byCustomer[key]) byCustomer[key] = {customer:o.customer, customerId:o.customerId||'', items:[]};
    byCustomer[key].items.push({...o, idx:i});
  });

  // Sort customers: numbers first then alpha
  const sortedCustomers = sortList(Object.values(byCustomer), g=>g.customer);

  _custKeyMap = {};
  document.getElementById('my-orders-list').innerHTML = sortedCustomers.map((g, ci)=>{
    _custKeyMap[ci] = g.customer;
    // collect all notes (deduplicated, non-empty)
    const allNotes = [...new Set(g.items.map(o=>o.orderNote).filter(Boolean))];

    // group items by category, sort cats then products within each cat
    const byCat = {};
    g.items.forEach(o=>{
      const cat = o.cat||'未分類';
      if(!byCat[cat]) byCat[cat]=[];
      byCat[cat].push(o);
    });
    const sortedCats = sortList(Object.keys(byCat), c=>c);

    // total amount for this customer
    const custTotal = g.items.reduce((a,o)=>a+parseFloat(o.price||0)*(o.qty||0),0);
    const custQty   = g.items.reduce((a,o)=>a+(o.qty||0),0);
    const hasPrices = g.items.some(o=>o.price&&parseFloat(o.price)>0);

    const catBlocks = sortedCats.map(cat=>{
      const items = sortList(byCat[cat], o=>o.product);
      const catQty = items.reduce((a,o)=>a+(o.qty||0),0);
      const catAmt = items.reduce((a,o)=>a+parseFloat(o.price||0)*(o.qty||0),0);
      const catHasP = items.some(o=>o.price&&parseFloat(o.price)>0);
      return `
        <div style="margin-bottom:2px">
          <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:8px 16px 4px;background:var(--bg)">${cat}</div>
          ${items.map(o=>`
            <div class="oc-item">
              <div style="flex:1;min-width:0">
                <div class="oci-name">${o.product}${o.price?` <span style="color:var(--text3);font-size:12px">$${o.price}</span>`:''}</div>
                ${o.note?`<div class="oci-note">備註：${o.note}</div>`:''}
              </div>
              <span class="oci-qty">×${o.qty}</span>
            </div>`).join('')}
          ${catHasP?`<div style="display:flex;justify-content:flex-end;padding:6px 16px;font-size:13px;color:var(--green-dark);font-weight:500">小計 $${catAmt.toLocaleString()} · ${catQty}件</div>`:''}
        </div>`;
    }).join('');

    const safeKey = g.customer.replace(/"/g,'&quot;');
    return `
    <div class="order-card" style="margin-bottom:14px" data-custkey="${safeKey}">
      <div class="order-card-head">
        <div style="flex:1;cursor:pointer" onclick="openEditCustomerOrder(${ci})">
          <div style="margin-bottom:2px">${custLabel(g.customer, g.customerId)}</div>
          <div style="display:flex;gap:10px;margin-top:3px;flex-wrap:wrap">
            <span style="font-size:13px;color:var(--text3)">${custQty} 件</span>
            ${hasPrices?`<span style="font-size:13px;color:var(--green-dark);font-weight:600">$${custTotal.toLocaleString()}</span>`:''}
          </div>
          ${allNotes.length?`<div style="font-size:12px;color:var(--text3);margin-top:3px">📝 ${allNotes.join('・')}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
          <span style="font-size:13px;color:var(--accent);cursor:pointer" onclick="openEditCustomerOrder(${ci})">編輯</span>
          <button onclick="quickDeleteCustomer(${ci})"
            style="background:none;border:none;font-size:13px;color:var(--red);cursor:pointer;font-family:inherit;font-weight:500;padding:0">刪除整單</button>
        </div>
      </div>
      <div class="order-card-items">${catBlocks}</div>
      ${hasPrices?`<div style="display:flex;justify-content:flex-end;padding:10px 16px;border-top:0.5px solid var(--border);font-size:14px;font-weight:600">總計 <span style="color:var(--green-dark);margin-left:8px">$${custTotal.toLocaleString()}</span></div>`:''}
    </div>`;
  }).join('');
}

function renderStatsByCat(){
  const orders = getMergedOrders();
  const boxEl = document.getElementById('stat-summary-boxes');
  const catEl = null; // removed

  if(!orders.length){
    boxEl.innerHTML='';
    catEl.innerHTML='<div class="empty-state"><div class="es-icon">📊</div><p>尚無訂單資料</p></div>';
    return;
  }

  const totalQty = orders.reduce((a,o)=>a+(o.qty||0),0);
  const skuCount = new Set(orders.map(o=>o.product)).size;
  boxEl.innerHTML=`
    <div class="stat-box"><div class="st-label">總數量</div><div class="st-val">${totalQty}</div></div>
    <div class="stat-box"><div class="st-label">商品種類</div><div class="st-val">${skuCount}</div></div>`;

  // build cat → product qty map
  const catMap={};
  orders.forEach(o=>{
    const cat=o.cat||'未分類';
    if(!catMap[cat]) catMap[cat]={qty:0,products:{}};
    catMap[cat].qty+=(o.qty||0);
    if(!catMap[cat].products[o.product]) catMap[cat].products[o.product]=0;
    catMap[cat].products[o.product]+=(o.qty||0);
  });

  const sortedCats = sortList(Object.keys(catMap), c=>c);

  catEl.innerHTML = sortedCats.map(cat=>{
    const data = catMap[cat];
    const prods = sortList(Object.entries(data.products), ([name])=>name);
    return `<div style="margin-bottom:12px;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--surface2);border-bottom:0.5px solid var(--border)">
        <span style="font-weight:600;font-size:15px">${cat}</span>
        <span style="font-size:13px;color:var(--accent);font-weight:600">共 ${data.qty} 件</span>
      </div>
      ${prods.map(([name,qty])=>`
      <div style="display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border)">
        <span style="font-size:17px;font-weight:800;color:var(--red);min-width:44px;text-align:center;flex-shrink:0">${qty}</span>
        <span style="font-size:14px;font-weight:500">${name}</span>
      </div>`).join('')}
    </div>`;

function buildSummary(orders){
  const map={};
  orders.forEach(o=>{
    const key = `${o.cat||'未分類'}|||${o.product}`;
    if(!map[key]) map[key]={product:o.product, cat:o.cat||'未分類', qty:0};
    map[key].qty += (o.qty||0);
  });
  return Object.values(map).sort((a,b)=>b.qty-a.qty);
}

function saveMergeFullOrder(){
  const newName = document.getElementById('edit-customer-name').value.trim();
  if(!newName){ toast('請填入客戶名稱'); return; }
  if(!S.customers.some(c=>c.name===newName||c.id===newName)){ alertGoManage(`找不到客戶「${newName}」`); return; }

  const rows=[...document.querySelectorAll('#edit-items-list > div')];
  if(!rows.length){ toast('請至少保留一項商品'); return; }
  const newItems=[]; let err=false;
  rows.forEach((row,i)=>{
    if(err) return;
    const inputs=row.querySelectorAll('input[type=text],input[type=number]');
    const product=inputs[0].value.trim();
    const qty=parseInt(inputs[1].value)||0;
    const note=inputs[2].value.trim();

    if(!S.products.some(p=>p.name===product)){ alertGoManage(`找不到商品「${product}」`); err=true; return; }
    const prod=S.products.find(p=>p.name===product)||{};
    newItems.push({product, qty, price:prod.price||'', cat:prod.cat||'', note});
  });
  if(err) return;

  const src=S.mergeSources[mergeEditSrcIdx]; if(!src) return;
  const orig=src.orders.find(o=>o.customer===mergeEditCustomerKey)||{};
  const custObj=S.customers.find(c=>c.name===newName||c.id===newName)||{};
  const time=new Date().toLocaleString('zh-TW',{hour12:false});

  // remove old orders for this customer in this source
  src.orders=src.orders.filter(o=>o.customer!==mergeEditCustomerKey);
  // add new
  newItems.forEach(item=>{
    src.orders.push({customer:custObj.name||newName, customerId:custObj.id||orig.customerId||'',
      product:item.product, qty:item.qty, price:item.price, cat:item.cat,
      note:item.note, orderNote:orig.orderNote||'', time});
  });
  save(); closeModal('modal-edit-order');
  renderMerge(); toast('✓ 已更新');
}

// Sort: numbers first (by numeric value), then letters (alphabetically)
function sortList(arr, keyFn){
  return [...arr].sort((a,b)=>{
    const ka = keyFn(a), kb = keyFn(b);
    const na = parseFloat(ka), nb = parseFloat(kb);
    const aIsNum = !isNaN(na) && ka.trim()!=='';
    const bIsNum = !isNaN(nb) && kb.trim()!=='';
    if(aIsNum && bIsNum) return na - nb;
    if(aIsNum) return -1;
    if(bIsNum) return 1;
    return ka.localeCompare(kb, 'zh-TW');
  });
}

function handleCustFile(e){
  const file=e.target.files[0]; if(!file) return;
  e.target.value='';
  const ext = file.name.split('.').pop().toLowerCase();

  if(ext==='xlsx'||ext==='xls'){
    // Excel 格式
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        let added=0;
        rows.forEach(row=>{
          // 支援：第一欄=編號，第二欄=名稱
          // 或：有標題列（自動跳過非資料列）
          const id   = String(row[0]||'').trim();
          const name = String(row[1]||'').trim();
          if(!id&&!name) return;
          if(!name) return; // 至少要有名稱
          // 跳過標題列（編號欄是「編號」「id」等文字）
          if(['編號','id','客戶編號','no'].includes(id.toLowerCase())) return;
          if(!S.customers.some(c=>c.id===id&&id||c.name===name)){
            S.customers.push({id,name}); added++;
          }
        });
        save(); renderCustList();
        toast(`✓ 匯入 ${added} 位客戶`);
      }catch(err){ toast('讀取 Excel 失敗'); console.error(err); }
    };
    reader.readAsBinaryString(file);

  } else {
    // CSV 格式（原本邏輯）
    const reader=new FileReader();
    reader.onload=ev=>{
      let added=0;
      ev.target.result.split('\n').filter(l=>l.trim()).forEach(line=>{
        const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
        const id=p[0]||'', name=p[1]||'';
        if(!name) return;
        if(['編號','id','客戶編號'].includes(id.toLowerCase())) return;
        if(!S.customers.some(c=>c.id===id&&id||c.name===name)){
          S.customers.push({id,name}); added++;
        }
      });
      save(); renderCustList(); toast(`✓ 匯入 ${added} 位客戶`);
    };
    reader.readAsText(file,'UTF-8');
  }
}

let editCustACIdx = -1;
function editCustAC(inp){
  editCustACIdx = -1;
  const q = inp.value.trim().toLowerCase();
  const dd = document.getElementById('edit-cust-ac');
  if(!q){ dd.style.display='none'; return; }
  const hits = S.customers.filter(c=>c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)).slice(0,8);
  if(!hits.length){ dd.style.display='none'; return; }
  dd.innerHTML = hits.map((c,i)=>`<div class="ac-item" data-i="${i}" onclick="editSelCust('${esc(c.name)}')">

  </div>`).join('');
  dd.style.display='block';

function editCustKey(e){
  const dd=document.getElementById('edit-cust-ac');
  const items=[...dd.querySelectorAll('.ac-item')];
  if(e.key==='ArrowDown'){ editCustACIdx=Math.min(editCustACIdx+1,items.length-1); hlAC(items,editCustACIdx); e.preventDefault(); }
  else if(e.key==='ArrowUp'){ editCustACIdx=Math.max(editCustACIdx-1,0); hlAC(items,editCustACIdx); e.preventDefault(); }
  else if(e.key==='Enter'&&editCustACIdx>=0&&items[editCustACIdx]){ items[editCustACIdx].click(); e.preventDefault(); }
  else if(e.key==='Escape') dd.style.display='none';
}

  document.getElementById('edit-cust-ac').style.display='none';

function saveFullOrder(){
  const oldKey   = document.getElementById('edit-customer-key').value;
  const newName  = document.getElementById('edit-customer-name').value.trim();
  if(!newName){ toast('請填入客戶名稱'); return; }

  // validate customer exists
  if(!S.customers.some(c=>c.name===newName||c.id===newName)){
    alertGoManage(`找不到客戶「${newName}」`); return;
  }

  const rows = [...document.querySelectorAll('#edit-items-list > div')];
  const newItems = [];
  let err = false;
  rows.forEach((row,i)=>{
    if(err) return;
    const inputs = row.querySelectorAll('input[type=text], input[type=number]');
    const product = inputs[0].value.trim();
    const qty     = parseInt(inputs[1].value)||0;
    const note    = inputs[2] ? inputs[2].value.trim() : '';
    // skip completely blank rows (no product name)
    if(!product) return;
    const prod = S.products.find(p=>p.name===product)||{};
    newItems.push({ product, qty: qty||0, price:prod.price||'', cat:prod.cat||'', note });
  });
  if(err) return;
  if(!newItems.length){ toast('請至少填入一項商品名稱'); return; }

  // find original customerId & orderNote from first matching order
  const orig = S.myOrders.find(o=>o.customer===oldKey)||{};
  const custObj = S.customers.find(c=>c.name===newName||c.id===newName)||{};
  const time  = new Date().toLocaleString('zh-TW',{hour12:false});

  // remove all old orders for this customer
  S.myOrders = S.myOrders.filter(o=>o.customer!==oldKey);

  // insert new items
  newItems.forEach(item=>{
    S.myOrders.push({
      customer: custObj.name||newName,
      customerId: custObj.id||orig.customerId||'',
      product: item.product,
      qty: item.qty,
      price: item.price,
      cat: item.cat,
      note: item.note,
      orderNote: orig.orderNote||'',
      time
    });
  });

  save(); closeModal('modal-edit-order'); renderMyOrders(); updateBadge();
  toast('✓ 已更新');
}

// ── Compact encode/decode for orders (shrinks ~60%) ──
// order keys: customer→c, customerId→i, product→p, qty→q, price→$, cat→k, note→n, orderNote→N, time→t
function encodeOrders(orders){
  const arr = orders.map(o=>({
    c:o.customer, i:o.customerId||'', p:o.product,
    q:o.qty, $:o.price||'', k:o.cat||'',
    n:o.note||'', N:o.orderNote||'', t:o.time||''
  }));
  // strip empty strings to save more space
  arr.forEach(o=>{ Object.keys(o).forEach(k=>{ if(o[k]==='') delete o[k]; }); });
  return 'O1:'+JSON.stringify(arr);
}

function decodeOrders(raw){
  if(raw.startsWith('O1:')){
    const arr = JSON.parse(raw.slice(3));
    return arr.map(o=>({
      customer:o.c||'', customerId:o.i||'', product:o.p||'',
      qty:o.q||0, price:o.$||'', cat:o.k||'',
      note:o.n||'', orderNote:o.N||'', time:o.t||''
    }));
  }
  // fallback: plain JSON
  const data = JSON.parse(raw);
  if(!Array.isArray(data)) throw 0;
  return data;
}

// config compact encode/decode
function encodeConfig(cfg){
  const p = cfg.products.map(o=>({ k:o.cat||'', p:o.name, $:o.price||'' }));
  const c = cfg.customers.map(o=>({ i:o.id, c:o.name }));
  p.forEach(o=>{ Object.keys(o).forEach(k=>{ if(o[k]==='') delete o[k]; }); });
  return 'C1:'+JSON.stringify({p,c});
}

function decodeConfig(raw){
  if(raw.startsWith('C1:')){
    const d = JSON.parse(raw.slice(3));
    return {
      _type:'order_system_config',
      products:(d.p||[]).map(o=>({cat:o.k||'', name:o.p||'', price:o.$||''})),
      customers:(d.c||[]).map(o=>({id:o.i||'', name:o.c||''}))
    };
  }
  // fallback: plain JSON
  const cfg = JSON.parse(raw);
  if(cfg._type !== 'order_system_config') throw 0;
  return cfg;
}

function showCopyModal(mode){
  let text='', title='';
  if(mode==='orders'){
    if(!S.myOrders.length){ toast('尚無訂單可分享'); return; }
    text = encodeOrders(S.myOrders);
    title = '分享訂單給管理員';
  } else {
    if(!S.products.length && !S.customers.length){ toast('尚無設定資料可分享'); return; }
    text = encodeConfig({_type:'order_system_config', products:S.products, customers:S.customers});
    title = '複製設定檔';
  }
  const bytes = new Blob([text]).size;
  const kb = (bytes/1024).toFixed(1);
  document.getElementById('modal-copy-title').textContent = title;
  document.getElementById('modal-copy-text').value = text;
  document.getElementById('modal-copy-status').style.display = 'none';
  document.getElementById('modal-copy-hint').textContent = `約 ${kb} KB．點「全選複製」後貼到 LINE 傳給對方。`;
  document.getElementById('modal-copy-hint').style.display = 'block';
  openModal('modal-copy');
  setTimeout(()=>{ const ta=document.getElementById('modal-copy-text'); ta.focus(); ta.select(); }, 400);
}

function copyToClipboard(){
  const ta = document.getElementById('modal-copy-text');
  const text = ta.value;
  ta.focus(); ta.select();
  const showSuccess = () => {
    document.getElementById('modal-copy-status').style.display = 'block';
    document.getElementById('modal-copy-hint').style.display = 'none';
    toast('✓ 已複製，貼到 LINE 傳給對方');
  };
  const showFail = () => { toast('請長按文字框，選「全選」再「複製」'); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(showSuccess).catch(()=>{
      try{ document.execCommand('copy') ? showSuccess() : showFail(); } catch(e){ showFail(); }
    });
  } else {
    try{ document.execCommand('copy') ? showSuccess() : showFail(); } catch(e){ showFail(); }
  }
}

function confirmPaste(){
  const raw = document.getElementById('modal-paste-text').value.trim();
  if(!raw){ toast('請先貼上內容'); return; }
  if(pasteMode==='config'){
    try{
      const cfg = decodeConfig(raw);
      let addedP=0, addedC=0;
      (cfg.products||[]).forEach(p=>{ if(!S.products.some(x=>x.name===p.name&&x.cat===p.cat)){ S.products.push(p); addedP++; } });
      (cfg.customers||[]).forEach(c=>{ if(!S.customers.some(x=>x.id===c.id)){ S.customers.push(c); addedC++; } });
      save(); renderProdList(); renderCustList(); rebuildAllCatSelects();
      closeModal('modal-paste');
      toast(`✓ 匯入完成：${addedP} 項商品、${addedC} 位客戶`);
    }catch(e){ toast('格式有誤，請確認是設定檔內容'); }
  } else {
    try{
      const data = decodeOrders(raw);
      const label = `來源 ${S.mergeSources.length+1}`;
      S.mergeSources.push({label, orders:data}); save();
      closeModal('modal-paste');
      renderMerge(); toast(`✓ 已加入 ${data.length} 筆訂單`);
    }catch(e){ toast('格式有誤，請確認是訂單內容'); }
  }
}

    const lines=[];
    sortedCats.forEach(cat=>{
      lines.push(`【${cat}】`);
      sortList(byCat[cat],p=>p.name).forEach(p=>{ lines.push(`${p.name}${p.price?' $'+p.price:''}`); });

  } else {
    if(!S.customers.length){ toast('尚無客戶可匯出'); return; }

    const sorted=sortList(S.customers,c=>c.id);
    text=sorted.map(c=>`${c.id}  ${c.name}`).join('\n');
  }
  document.getElementById('list-copy-title').textContent=title;
  const ta=document.getElementById('list-copy-text');
  ta.value=text;
  openModal('modal-list-copy');
  setTimeout(()=>{ ta.focus(); ta.select(); },350);
}

function doListCopy(){

  const ok=()=>toast('✓ 已複製');
  const fail=()=>toast('請長按文字框手動複製');

}

// ════════════════════════════ SESSION MANAGEMENT ════════════════════════════
// S.sessions = [{id, name}], S.currentSession = id

async function openSessionPicker(){
  const el = document.getElementById('session-picker-list');
  el.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3)">載入中…</div>';
  openModal('modal-session-picker');

  const token = document.getElementById('notion-token')?.value?.trim();
  if(!token){
    el.innerHTML='<div style="padding:16px;text-align:center;color:var(--red)">請先到「資料管理」填入 Notion Token</div>';
    return;
  }

  const res = await notionRequest('POST', `/v1/databases/${NOTION_DB.sessions}/query`, {page_size:100});
  
  if(!res){
    el.innerHTML='<div style="padding:16px;color:var(--red)">讀取失敗，請確認 Token 和 Notion 連線</div>';
    return;
  }

  if(!res.results||!res.results.length){
    el.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3)">場次清單是空的，請先在 Notion 新增場次</div>';
    return;
  }

  S.sessions = res.results.map(r=>({
    id:   r.id,
    name: r.properties['場次名稱']?.title?.[0]?.plain_text||''
  })).filter(s=>s.name);
  save();

  if(!S.sessions.length){
    el.innerHTML='<div style="padding:16px;color:var(--red)">讀到資料但欄位名稱不符，請確認欄位名稱是「場次名稱」</div>';
    return;
  }

  el.innerHTML = S.sessions.map(s=>`
    <div onclick="selectSession('${s.id}')" style="display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:.5px solid var(--border);cursor:pointer">
      <span style="font-size:16px">${s.id===S.currentSession?'✅':'⬜'}</span>
      <span style="font-size:15px;font-weight:${s.id===S.currentSession?'600':'400'}">${s.name}</span>
    </div>`).join('');
}

function selectSession(id){
  S.currentSession = id;

const NOTION_WORKER = 'https://notion-api-proxy.eatapo.workers.dev';
const NOTION_DB = {
  orders:    '3a691cc8-9899-806f-9ca1-fae7bcaba5d6',
  customers: '3a691cc8-9899-8022-98fb-e170a69b903c',
  products:  '3a591cc8-9899-80fc-a360-d17bb4205338',
  sessions:  '3a691cc8-9899-8006-8cbe-fd3aa93a7c91'

function getNotionToken(){
  const el = document.getElementById('notion-token');
  const t = (el?.value?.trim()) || (localStorage.getItem('notion_token')||'').trim();
  if(!t){ toast('請先填入 Notion Token'); return null; }
  // 確保輸入框有值
  if(el && !el.value && t) el.value = t;
  return t;
}

function saveNotionSettings(){
  const t = document.getElementById('notion-token')?.value?.trim();
  try{ localStorage.setItem('notion_token', t); }catch(e){}
}

function loadNotionSettings(){
  try{
    const t = localStorage.getItem('notion_token');
    const el = document.getElementById('notion-token');
    if(t && el) el.value = t;
  }catch(e){}
}

async function notionRequest(method, path, body, silent=false){
  const token = getNotionToken(); if(!token) return null;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 55000); // 55秒逾時
    const res = await fetch(NOTION_WORKER + path, {
      method,
      headers:{ 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
      signal: controller.signal
    });
    clearTimeout(timeout);
    const data = await res.json();
    if(!res.ok){
      if(!silent){
        const msg = data.message || data.code || JSON.stringify(data);
        toast('Notion錯誤' + res.status + ':' + msg.substring(0,30));
      }
      return null;
    }
    return data;
  }catch(err){
    if(err.name==='AbortError'){
      if(!silent) toast('請求逾時，請稍後再試');
    } else {
      if(!silent) toast('網路錯誤：' + err.message);
    }
    return null;
  }
}

// 分頁讀取（無上限）
async function notionQueryAll(dbId){
  let results = [];
  let cursor = undefined;
  let page = 0;
  while(true){
    page++;
    const body = { page_size: 100 };
    if(cursor) body.start_cursor = cursor;
    const res = await notionRequest('POST', `/v1/databases/${dbId}/query`, body, false);
    if(!res || !res.results) break;
    results = results.concat(res.results);
    if(!res.has_more || !res.next_cursor) break;
    cursor = res.next_cursor;
    if(page > 50) break;
  }
  return results;
}

// 推送訂單（完整同步：新增/更新/標記刪除）
async function notionPushOrders(){
  const token = getNotionToken(); if(!token) return;
  if(!S.myOrders.length){ toast('沒有訂單可推送'); return; }

  const dbg = document.getElementById('notion-debug');
  const log = (msg)=>{ if(dbg) dbg.innerHTML += msg+'<br>'; toast(msg); };
  if(dbg) dbg.innerHTML = '';

  // 先確保每筆訂單都有穩定的 orderId
  let needSave = false;
  S.myOrders.forEach(o=>{
    if(!o.orderId){
      const key = `${o.customer}|${o.product}|${o.qty}|${o.time}`;
      let hash = 0;
      for(let i=0;i<key.length;i++){ hash=((hash<<5)-hash)+key.charCodeAt(i); hash|=0; }
      o.orderId = `stable-${Math.abs(hash).toString(36)}`;
      needSave = true;
    }
  });
  if(needSave) save();

  log('🔄 開始同步訂單...');
  log(`本機訂單：${S.myOrders.length} 筆`);

  // 讀取 Notion 所有訂單
  log('讀取 Notion 現有訂單…');
  const existing = await notionQueryAll(NOTION_DB.orders);
  log(`Notion 現有：${existing.length} 筆`);

  const notionMap = {};
  existing.forEach(r=>{
    const oid = r.properties['訂單ID']?.rich_text?.[0]?.plain_text||'';
    if(oid) notionMap[oid] = {
      pageId: r.id,
      deleted: r.properties['已刪除']?.checkbox||false
    };
  });

  const localIds = new Set(S.myOrders.map(o=>o.orderId));
  let added=0, updated=0, deleted=0, fail=0;

  // 1. 新增或更新
  log('新增/更新中…');
  for(const o of S.myOrders){
    const props = {
      '商品名稱':{ title:[{ text:{ content: o.product||'' } }] },
      '客戶名稱':{ rich_text:[{ text:{ content: o.customer||'' } }] },
      '客戶編號':{ rich_text:[{ text:{ content: o.customerId||'' } }] },
      '類別':    { rich_text:[{ text:{ content: o.cat||'' } }] },
      '數量':    { number: o.qty||0 },
      '價錢':    { number: o.price||0 },
      '單項備註':{ rich_text:[{ text:{ content: o.note||'' } }] },
      '整筆備註':{ rich_text:[{ text:{ content: o.orderNote||'' } }] },
      '場次':    { rich_text:[{ text:{ content: o.session||'' } }] },
      '入單時間':{ rich_text:[{ text:{ content: o.time||'' } }] },
      '訂單ID':  { rich_text:[{ text:{ content: o.orderId } }] },
      '已刪除':  { checkbox: false },
    };
    if(notionMap[o.orderId]){
      const res = await notionRequest('PATCH', `/v1/pages/${notionMap[o.orderId].pageId}`, { properties: props }, true);
      if(res) updated++; else fail++;
    } else {
      const res = await notionRequest('POST', '/v1/pages', { parent:{ database_id: NOTION_DB.orders }, properties: props }, true);
      if(res) added++; else fail++;
    }
  }

  // 2. 標記刪除
  log('標記已刪除…');
  for(const [oid, info] of Object.entries(notionMap)){
    if(!localIds.has(oid) && !info.deleted){
      const res = await notionRequest('PATCH', `/v1/pages/${info.pageId}`, {
        properties:{ '已刪除':{ checkbox: true } }
      }, true);
      if(res) deleted++; else fail++;
    }
  }

  save();
  log(`✅ 同步完成！新增 ${added}・更新 ${updated}・標記刪除 ${deleted}${fail?`・失敗 ${fail}`:''}`);
}

// 讀取所有資料
async function notionPullAll(){
  const token = getNotionToken(); if(!token) return;
  const dbg = document.getElementById('notion-debug');
  const log = (msg)=>{ if(dbg) dbg.innerHTML += msg+'<br>'; toast(msg); };

  log('🔄 開始讀取...');

  // 讀場次清單
  const sessResults = await notionQueryAll(NOTION_DB.sessions);
  log(`場次：${sessResults.length} 筆`);
  if(sessResults.length){
    S.sessions = sessResults.map(r=>({
      id:   r.id,
      name: r.properties['場次名稱']?.title?.[0]?.plain_text||''
    })).filter(s=>s.name);
    updateSessionBar();
  }

  // 讀客戶名單（合併，不覆蓋）
  const custResults = await notionQueryAll(NOTION_DB.customers);
  log(`客戶：${custResults.length} 筆`);
  if(custResults.length){
    const incoming = custResults.map(r=>({
      name: r.properties['姓名']?.title?.[0]?.plain_text||'',
      id:   r.properties['編號']?.rich_text?.[0]?.plain_text||''
    })).filter(c=>c.name);
    // 合併：本機沒有的才加入
    const localNames = new Set(S.customers.map(c=>c.name));
    const newCusts = incoming.filter(c=>!localNames.has(c.name));
    S.customers = [...S.customers, ...newCusts];
    renderCustList();
  }

  // 讀商品清單
  const prodResults = await notionQueryAll(NOTION_DB.products);
  log(`商品：${prodResults.length} 筆`);
  if(prodResults.length){
    S.products = prodResults.map(r=>({
      name:  r.properties['商品名稱']?.title?.[0]?.plain_text||'',
      cat:   r.properties['類別']?.rich_text?.[0]?.plain_text||'',
      price: r.properties['價格']?.number||''
    })).filter(p=>p.name);
    renderProdList(); rebuildAllCatSelects();
  }

  // 讀訂單（合併，不覆蓋，用 orderId 去重）
  const orderResults = await notionQueryAll(NOTION_DB.orders);
  log(`訂單：${orderResults.length} 筆`);
  if(orderResults.length){
    const incoming = orderResults.map(r=>({
      product:    r.properties['商品名稱']?.title?.[0]?.plain_text||'',
      customer:   r.properties['客戶名稱']?.rich_text?.[0]?.plain_text||'',
      customerId: r.properties['客戶編號']?.rich_text?.[0]?.plain_text||'',
      cat:        r.properties['類別']?.rich_text?.[0]?.plain_text||'',
      qty:        r.properties['數量']?.number||0,
      price:      r.properties['價錢']?.number||0,
      note:       r.properties['單項備註']?.rich_text?.[0]?.plain_text||'',
      orderNote:  r.properties['整筆備註']?.rich_text?.[0]?.plain_text||'',
      time:       r.properties['入單時間']?.rich_text?.[0]?.plain_text||'',
      session:    r.properties['場次']?.rich_text?.[0]?.plain_text||'',
      orderId:    r.properties['訂單ID']?.rich_text?.[0]?.plain_text||'',
      deleted:    r.properties['已刪除']?.checkbox||false
    })).filter(o=>o.product&&o.customer&&!o.deleted);
    // 用 orderId 合併，本機有的保留，Notion 有但本機沒有的加入
    const localIds = new Set(S.myOrders.map(o=>o.orderId).filter(Boolean));
    const newOrders = incoming.filter(o=>!o.orderId || !localIds.has(o.orderId));
    S.myOrders = [...S.myOrders, ...newOrders];
    renderMyOrders(); updateBadge();
  }

  save();
  toast(`✓ 讀取完成：${S.customers.length} 位客戶・${S.products.length} 件商品・${S.myOrders.length} 筆訂單`);
}
